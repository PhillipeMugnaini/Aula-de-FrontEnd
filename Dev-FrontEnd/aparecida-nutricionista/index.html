<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8">
		<title>Aparecida Nutrição</title>
		<link rel="icon" href="favicon.ico" type="image/x-icon">
		<link rel="stylesheet" type="text/css" href="css/reset.css">
		<link rel="stylesheet" type="text/css" href="css/index.css">
	</head>
	<body>

		<header>
			<div class="container">
				<h2 class="titulo">Aparecida Nutrição</h2>
			</div>
		</header>
		<main>
			<section class="container">
				<a href="../index.html"><button>← Voltar ao início</button></a>

				<h2>Meus pacientes</h2>
				<input id="filtrar-tabela" type="text" placeholder="Filtrar pacientes...">
				<table>
					<thead>
						<tr>
							<th>Nome</th>
							<th>Peso(kg)</th>
							<th>Altura(m)</th>
							<th>Gordura Corporal(%)</th>
							<th>IMC</th>
						</tr>
					</thead>
					<tbody id="tabela-pacientes">
						<tr class="paciente" id="#primeiro-paciente" >
							<td class="info-nome">Paulo</td>
							<td class="info-peso">100</td>
							<td class="info-altura">2.00</td>
							<td class="info-gordura">10</td>
							<td class="info-imc">0</td>
						</tr>

						<tr class="paciente" id="#segundo-paciente" >
							<td class="info-nome">João</td>
							<td class="info-peso">80</td>
							<td class="info-altura">1.72</td>
							<td class="info-gordura">40</td>
							<td class="info-imc">0</td>
						</tr>
						
						<tr class="paciente" id="#terceiro-paciente" >
							<td class="info-nome">Erica</td>
							<td class="info-peso">54</td>
							<td class="info-altura">1.64</td>
							<td class="info-gordura">14</td>
							<td class="info-imc">0</td>
						</tr>

						<tr class="paciente" id="#quarto-paciente">
							<td class="info-nome">Douglas</td>
							<td class="info-peso">85</td>
							<td class="info-altura">1.73</td>
							<td class="info-gordura">24</td>
							<td class="info-imc">0</td>
						</tr>
						<tr class="paciente" id="#quinto-paciente" >
							<td class="info-nome">Tatiana</td>
							<td class="info-peso">46</td>
							<td class="info-altura">1.55</td>
							<td class="info-gordura">19</td>
							<td class="info-imc">0</td>
						</tr>
					</tbody>
				</table>

				<h2>Adicionar paciente</h2>
				<form action="form-adicionar">
					<div class="grupo">
						<label for="nome">Nome</label>
						<input class="grupo" id="nome" name="nome" placeholder="Nome do paciente" type="text">
					</div>
					<div class="grupo">
						<label for="peso">Peso (kg)</label>
						<input class="grupo" id="peso" name="peso" placeholder="Peso do paciente" type="text">
					</div>
					<div class="grupo">
						<label for="altura">Altura (m)</label>
						<input class="grupo" id="altura" name="altura" placeholder="Altura do paciente" type="text">
					</div>
					<div class="grupo">
						<label for="gordura">Gordura Corporal (%)</label>
						<input class="grupo" id="gordura" name="gordura" placeholder="Gordura do paciente" type="text">
					</div>
					<button id="adicionar-paciente" class="botao bto-principal">Adicionar</button>
				</form>
				<ul id="msg-erro"></ul>
			</section>
		</main>
		<script src="principal.js"></script>
		<script src="form-adiciona.js"></script>
	</body>
</html>
