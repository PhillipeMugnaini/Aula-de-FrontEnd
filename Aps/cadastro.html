 <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
</head>
<body>
    <h1>Informações Pessoais</h1>

    <form>

        <fieldset>
            <legend>Cadastro de Cliente</legend>

            <label for="nome">Nome:</label>
            <input type="text" size="60" id="nome" placeholder="Digite o nome do cliente" "><br><br>

            <label for="idade">Idade:</label>
            <input type="number" size="3" id="idade" placeholder="Digite a idade"><br><br>

            <label for="endereco">Endereço:</label>
            <br>
            <input type="text" size="90" id="endereco" placeholder="Digite o endereço "><br><br>
        
            <label for="cidade">Cidade:</label>
            <input type="text" size="50" id="cidade" placeholder="Digite a cidade"><br><br>
        
            <label for="estado">Estado:</label>
            <input type="text" size="2" id="estado" placeholder="UF" ><br><br>
            
            <label for="cep">CEP:</label>
            <input type="text" size="10" id="cep" placeholder="XXXXX-XXX"><br><br>

            <label for="telResp">Tel/Res:</label>
            <input type="text" id="telResp" placeholder="99 99999-9999"><br><br>

            <label for="telCel">Tel/Cel:</label>
            <input type="text" id="telCel" placeholder="99 99999-9999"><br><br>

            <label for="email">Email:</label>
            <input type="email" size="90" id="email" placeholder="Digite o email"><br><br>

        </fieldset>
    </form>
    <button>Enviar</button>
    
</body>
</html>
