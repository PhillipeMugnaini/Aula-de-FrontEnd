<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boletim mensal</title>
</head>
<body>
    <div>
        <h1>Meu amigo cão - Pet shop</h1>
        <h1>Boletim mensal</h1>

        <h2>Assine já!</h2>

        <h5>Fazendo sua assinatura <br> você receberá mensalmente informações sobre nossos produtos, serviços, eventos e descontos</h5>

        <form action="tabela.html">
                 <label for="nome">Nome</label>
                <input type="text" name="nome" id="nome" size="50" placeholder="Digite seu nome">
                <br><br>
                <label for="email">E-mail</label>
                <input type="email" name="email" id="email" size="40" placeholder="Digite seu endereço de email">
                <br><br>
                <input type="submit" value="Enviar">
        </form>
    </div>
    
</body>
